  - https://docs.massivemusic.com/docs/partners
  - https://docs.massivemusic.com/docs/client-usage-reports-1
  - https://docs.massivemusic.com/docs/label-reports
  - https://docs.massivemusic.com/docs/streaming-plays-s3-bucket-logger
  - https://docs.massivemusic.com/docs/subscription-plays-s3-bucket-logger
