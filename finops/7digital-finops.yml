description: >-
  FOCUS-aligned FinOps view of 7digital / MassiveMusic — a B2B music platform
  whose billing surface is dominated by per-stream / per-download licensor
  royalty pass-through plus a platform / integration fee. Costs are largely
  variable (driven by streams and downloads) with a smaller fixed platform
  charge; cost optimisation centres on driving stream volume against the
  appropriate usage type (preview vs catalogue vs subscriber) and using the
  S3 bulk-log path to avoid per-second log throttling.
