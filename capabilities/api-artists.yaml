naftiko: 1.0.0-alpha2
info:
  label: 7digital API — Artists
  description: '7digital API — Artists. 10 operations. Lead operation: 7digital Browse Artists. Self-contained Naftiko capability covering one 7digital / MassiveMusic business surface.'
  tags:
  - 7digital / MassiveMusic
  - Music
  - Artists
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    SEVENDIGITAL_CONSUMER_KEY: SEVENDIGITAL_CONSUMER_KEY
    SEVENDIGITAL_CONSUMER_SECRET: SEVENDIGITAL_CONSUMER_SECRET
capability:
  consumes:
  - type: http
    namespace: api-artists
    baseUri: https://api.7digital.com/1.2
    description: 7digital API — Artists business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: oauth_consumer_key
      value: '{{env.SEVENDIGITAL_CONSUMER_KEY}}'
      placement: query
    resources:
    - name: artist-browse
      path: /artist/browse
      operations:
      - name: browseArtists
        method: GET
        description: 7digital Browse Artists
        inputParameters:
        - name: letter
          in: query
          type: string
          required: true
          description: The starting letter or letters to browse by (e.g. `A`, `Be`).
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-chart
      path: /artist/chart
      operations:
      - name: getArtistChart
        method: GET
        description: 7digital Get Artist Chart
        inputParameters:
        - name: country
          in: query
          type: string
          required: false
          description: ISO 3166-1 alpha-2 country code for the sales territory.
        - name: period
          in: query
          type: string
          required: false
          description: Chart period — typically `day`, `week`, `month`, `year`.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-details
      path: /artist/details
      operations:
      - name: getArtistDetails
        method: GET
        description: 7digital Get Artist Details
        inputParameters:
        - name: artistId
          in: query
          type: string
          required: true
          description: 7digital artist id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-releases
      path: /artist/releases
      operations:
      - name: getArtistReleases
        method: GET
        description: 7digital Get Artist Releases
        inputParameters:
        - name: artistId
          in: query
          type: string
          required: true
          description: 7digital artist id.
        - name: type
          in: query
          type: string
          required: false
          description: Release type filter.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-similar
      path: /artist/similar
      operations:
      - name: getSimilarArtists
        method: GET
        description: 7digital Get Similar Artists
        inputParameters:
        - name: artistId
          in: query
          type: string
          required: true
          description: 7digital artist id.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-search
      path: /artist/search
      operations:
      - name: searchArtists
        method: GET
        description: 7digital Search Artists
        inputParameters:
        - name: q
          in: query
          type: string
          required: true
          description: Free-text search query.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-toptracks
      path: /artist/topTracks
      operations:
