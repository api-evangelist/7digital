        method: GET
        description: 7digital Get Artist Top Tracks
        inputParameters:
        - name: artistId
          in: query
          type: string
          required: true
          description: 7digital artist id.
        - name: page
          in: query
          type: integer
          required: false
          description: 1-based page number for paged endpoints.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Number of items per page.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: artist-tags
      path: /artist/tags
      operations:
