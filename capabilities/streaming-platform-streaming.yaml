      path: /streaming/catalogue/{trackId}/hls
      operations:
      - name: streamCatalogueTrackHls
        method: GET
        description: 7digital Stream Catalogue Track Hls
        inputParameters:
        - name: trackId
          in: path
          type: string
          required: true
          description: 7digital track id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
