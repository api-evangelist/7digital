naftiko: 1.0.0-alpha2
info:
  label: 7digital API — IpLookup
  description: '7digital API — IpLookup. 1 operations. Lead operation: 7digital Resolve Country For Ip. Self-contained Naftiko capability covering one 7digital / MassiveMusic business surface.'
  tags:
  - 7digital / MassiveMusic
  - Music
  - IpLookup
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    SEVENDIGITAL_CONSUMER_KEY: SEVENDIGITAL_CONSUMER_KEY
    SEVENDIGITAL_CONSUMER_SECRET: SEVENDIGITAL_CONSUMER_SECRET
capability:
  consumes:
  - type: http
    namespace: api-iplookup
    baseUri: https://api.7digital.com/1.2
    description: 7digital API — IpLookup business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: oauth_consumer_key
      value: '{{env.SEVENDIGITAL_CONSUMER_KEY}}'
      placement: query
    resources:
    - name: country-resolve
      path: /country/resolve
      operations:
      - name: resolveCountryForIp
        method: GET
        description: 7digital Resolve Country For Ip
        inputParameters:
        - name: ip
          in: query
          type: string
          required: true
          description: IPv4 or IPv6 address to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: api-iplookup-rest
    port: 8080
    description: REST adapter for 7digital API — IpLookup. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/country/resolve
      name: country-resolve
      description: REST surface for country-resolve.
      operations:
      - method: GET
        name: resolveCountryForIp
        description: 7digital Resolve Country For Ip
        call: api-iplookup.resolveCountryForIp
        with:
          ip: rest.ip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-iplookup-mcp
    port: 9090
    transport: http
    description: MCP adapter for 7digital API — IpLookup. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: resolve-country-ip
      description: 7digital Resolve Country For Ip
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-iplookup.resolveCountryForIp
      with:
        ip: tools.ip
      outputParameters:
      - type: object
        mapping: $.
