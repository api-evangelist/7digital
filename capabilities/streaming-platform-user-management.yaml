naftiko: 1.0.0-alpha2
info:
  label: 7digital / MassiveMusic Streaming Platform API — User Management
  description: '7digital / MassiveMusic Streaming Platform API — User Management. 1 operations. Lead operation: 7digital Create User. Self-contained Naftiko capability covering one 7digital / MassiveMusic
    business surface.'
  tags:
  - 7digital / MassiveMusic
  - Music
  - User Management
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    SEVENDIGITAL_CONSUMER_KEY: SEVENDIGITAL_CONSUMER_KEY
    SEVENDIGITAL_CONSUMER_SECRET: SEVENDIGITAL_CONSUMER_SECRET
capability:
  consumes:
  - type: http
    namespace: streaming-platform-user-management
    baseUri: https://api.7digital.com
    description: 7digital / MassiveMusic Streaming Platform API — User Management business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: oauth_consumer_key
      value: '{{env.SEVENDIGITAL_CONSUMER_KEY}}'
      placement: query
    resources:
    - name: users
      path: /users
      operations:
      - name: createUser
        method: POST
        description: 7digital Create User
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: streaming-platform-user-management-rest
    port: 8080
    description: REST adapter for 7digital / MassiveMusic Streaming Platform API — User Management. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: POST
        name: createUser
        description: 7digital Create User
        call: streaming-platform-user-management.createUser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: streaming-platform-user-management-mcp
    port: 9090
    transport: http
    description: MCP adapter for 7digital / MassiveMusic Streaming Platform API — User Management. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-user
      description: 7digital Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: streaming-platform-user-management.createUser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
