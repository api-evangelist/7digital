naftiko: 1.0.0-alpha2
info:
  label: 7digital API — Users
  description: '7digital API — Users. 2 operations. Lead operation: 7digital Find Users. Self-contained Naftiko capability covering one 7digital / MassiveMusic business surface.'
  tags:
  - 7digital / MassiveMusic
  - Music
  - Users
  created: '2026-05-28'
  modified: '2026-05-28'
binds:
- namespace: env
  keys:
    SEVENDIGITAL_CONSUMER_KEY: SEVENDIGITAL_CONSUMER_KEY
    SEVENDIGITAL_CONSUMER_SECRET: SEVENDIGITAL_CONSUMER_SECRET
capability:
  consumes:
  - type: http
    namespace: api-users
    baseUri: https://api.7digital.com/1.2
    description: 7digital API — Users business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: oauth_consumer_key
      value: '{{env.SEVENDIGITAL_CONSUMER_KEY}}'
      placement: query
    resources:
    - name: users
      path: /users
      operations:
      - name: findUsers
        method: GET
        description: 7digital Find Users
        inputParameters:
        - name: email
          in: query
          type: string
          required: false
          description: Filter by user email.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-id-update
      path: /users/{id}/update
      operations:
      - name: updateUser
        method: PUT
        description: 7digital Update User
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user id to update.
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: api-users-rest
    port: 8080
    description: REST adapter for 7digital API — Users. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: findUsers
        description: 7digital Find Users
        call: api-users.findUsers
        with:
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{id}/update
      name: users-id-update
      description: REST surface for users-id-update.
      operations:
      - method: PUT
        name: updateUser
        description: 7digital Update User
        call: api-users.updateUser
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: api-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for 7digital API — Users. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: find-users
      description: 7digital Find Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: api-users.findUsers
      with:
        email: tools.email
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: 7digital Update User
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: api-users.updateUser
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
