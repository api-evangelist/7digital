    port: 9090
    transport: http
    description: MCP adapter for 7digital / MassiveMusic Streaming Platform API — Subscriptions. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-subscription
      description: 7digital Create Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: streaming-platform-subscriptions.createSubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
