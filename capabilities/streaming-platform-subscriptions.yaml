  - type: rest
    namespace: streaming-platform-subscriptions-rest
    port: 8080
    description: REST adapter for 7digital / MassiveMusic Streaming Platform API — Subscriptions. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: POST
        name: createSubscription
        description: 7digital Create Subscription
        call: streaming-platform-subscriptions.createSubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
