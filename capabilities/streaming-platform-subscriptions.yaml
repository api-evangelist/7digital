  - type: http
    namespace: streaming-platform-subscriptions
    baseUri: https://api.7digital.com
    description: 7digital / MassiveMusic Streaming Platform API — Subscriptions business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: oauth_consumer_key
      value: '{{env.SEVENDIGITAL_CONSUMER_KEY}}'
      placement: query
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: createSubscription
        method: POST
        description: 7digital Create Subscription
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body payload.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
