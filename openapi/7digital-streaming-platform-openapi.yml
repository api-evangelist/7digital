        image:
          type: string
          format: uri
          example: 'https://artwork-cdn.7static.com/static/img/sleeveart/00/117/000/0011700062_350.jpg'
      required: [trackId, title, artist]
    PlaylistTrack:
      allOf:
        - $ref: '#/components/schemas/PlaylistTrackInput'
        - type: object
          properties:
            position:
              type: integer
              example: 1
            addedAt:
              type: string
              format: date-time
              example: '2026-05-28T14:30:00Z'
    Playlist:
      type: object
      properties:
        id:
          type: string
          example: 'playlist-789012'
        name:
          type: string
          example: 'Morning Run'
        description:
          type: string
          maxLength: 500
          example: 'High-energy tracks for early-morning runs.'
        visibility:
          type: string
          enum: [private, public]
          example: 'public'
        userId:
          type: string
          nullable: true
          example: '500123'
        trackCount:
          type: integer
          example: 24
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistTrack'
        createdAt:
          type: string
          format: date-time
          example: '2026-05-28T14:30:00Z'
        modifiedAt:
          type: string
          format: date-time
          example: '2026-05-28T15:00:00Z'
    PlaylistListResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 12
        playlists:
          type: array
          items:
            $ref: '#/components/schemas/Playlist'
    CreatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
          example: 'Morning Run'
        description:
          type: string
          maxLength: 500
          example: 'High-energy tracks for early-morning runs.'
        visibility:
          type: string
          enum: [private, public]
          example: 'public'
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistTrackInput'
      required: [name]
    UpdatePlaylistRequest:
      type: object
      properties:
        name:
          type: string
          example: 'Morning Run'
        description:
          type: string
          maxLength: 500
          example: 'High-energy tracks for early-morning runs.'
        visibility:
          type: string
          enum: [private, public]
          example: 'public'
    AddTracksRequest:
      type: object
      properties:
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistTrackInput'
      required: [tracks]
    CreateSubscriptionRequest:
      type: object
      properties:
        userId:
          type: string
          example: '500123'
        productId:
          type: string
          example: 'unlimited-streaming-monthly'
        startDate:
          type: string
          format: date
          example: '2026-05-28'
        endDate:
          type: string
          format: date
          description: Subscription expiry. Maximum one month from startDate.
          example: '2026-06-28'
        country:
          type: string
          example: 'GB'
      required: [userId, productId, startDate, endDate]
    Subscription:
      type: object
      properties:
        subscriptionId:
          type: string
          example: 'sub-789012'
        userId:
          type: string
          example: '500123'
        productId:
          type: string
          example: 'unlimited-streaming-monthly'
        status:
          type: string
          enum: [active, cancelled, expired]
          example: 'active'
        startDate:
          type: string
          format: date
          example: '2026-05-28'
        endDate:
          type: string
          format: date
          example: '2026-06-28'
    CreateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'jane.smith@example.com'
        password:
          type: string
          format: password
          example: 'P@ssw0rd123!'
        firstName:
          type: string
          example: 'Jane'
        lastName:
          type: string
          example: 'Smith'
        country:
          type: string
          example: 'GB'
      required: [email, password, country]
    User:
      type: object
      properties:
        id:
          type: string
