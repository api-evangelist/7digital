    DeviceAuthorisation:
      type: object
      properties:
        deviceId:
          type: string
          example: 'device-789012'
        deviceName:
          type: string
          example: "Jane's iPhone"
        platform:
          type: string
          enum: [ios, android, web, windows, macos]
          example: 'ios'
        status:
          type: string
          enum: [authorised, deauthorised]
          example: 'authorised'
        authorisedAt:
          type: string
          format: date-time
          example: '2026-05-01T10:00:00Z'
    Locker:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 42
        releases:
          type: array
          items:
            $ref: '#/components/schemas/Release'
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'
    CreditItemRequest:
