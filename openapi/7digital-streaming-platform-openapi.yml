        skipAllowed:
          type: boolean
          example: true
    PlaybackEvent:
      type: object
      properties:
        trackId:
          type: string
          example: '123456'
        eventType:
          type: string
          enum: [start, complete, skip, pause, resume]
          example: 'complete'
        timestamp:
          type: string
          format: date-time
          example: '2026-05-28T14:30:45Z'
        durationPlayed:
          type: integer
          description: Seconds of the track that were played.
          example: 259
      required: [trackId, eventType, timestamp]
    PlaybackEventBatch:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/PlaybackEvent'
      required: [events]
    StreamLog:
      type: object
      properties:
        trackId:
          type: string
          example: '123456'
        userId:
          type: string
          example: '500123'
        clientId:
          type: string
          example: 'device-789012'
        timestamp:
          type: string
          format: date-time
          example: '2026-05-28T14:30:45Z'
        durationPlayed:
          type: integer
          description: Seconds streamed.
          example: 259
        country:
          type: string
          example: 'GB'
      required: [trackId, timestamp]
    StreamLogBatch:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/StreamLog'
      required: [logs]
    DeviceAuthorisationRequest:
      type: object
      properties:
