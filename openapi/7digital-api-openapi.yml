          example: 'visa'
        expiryMonth:
          type: integer
          example: 12
        expiryYear:
          type: integer
          example: 2028
        isDefault:
          type: boolean
          example: true
    CardRegistrationRequest:
      type: object
      properties:
        cardNumber:
          type: string
          example: '4242424242424242'
        expiryMonth:
          type: integer
          example: 12
        expiryYear:
          type: integer
          example: 2028
        cvv:
          type: string
          example: '123'
        cardholderName:
          type: string
          example: 'Jane Smith'
      required: [cardNumber, expiryMonth, expiryYear, cvv]
    CardRegistration:
      type: object
      properties:
        registrationId:
          type: string
          example: 'cardreg-789012'
        status:
          type: string
          enum: [pending, registered, failed]
          example: 'registered'
        cardId:
          type: string
          nullable: true
          example: 'card-789012'
    User:
      type: object
      properties:
        id:
          type: string
          example: '500123'
        email:
          type: string
          format: email
          example: 'jane.smith@example.com'
        firstName:
          type: string
          example: 'Jane'
        lastName:
          type: string
          example: 'Smith'
        country:
          type: string
          example: 'GB'
        accessToken:
          type: string
          description: Partner-scoped user access token (returned on signup / authenticate).
          example: 'tok-a1b2c3d4'
        accessTokenSecret:
          type: string
          description: Partner-scoped user access token secret.
          example: 'sec-a1b2c3d4'
    UserSignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'jane.smith@example.com'
        password:
          type: string
          format: password
          example: 'P@ssw0rd123!'
        firstName:
          type: string
          example: 'Jane'
        lastName:
          type: string
          example: 'Smith'
        country:
          type: string
          example: 'GB'
      required: [email, password, country]
    UserUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: 'jane.smith@example.com'
        firstName:
          type: string
          example: 'Jane'
        lastName:
          type: string
          example: 'Smith'
        country:
          type: string
          example: 'GB'
    Country:
      type: object
      properties:
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 code.
          example: 'GB'
        name:
          type: string
          example: 'United Kingdom'
        currency:
          type: string
          description: ISO 4217 currency code.
          example: 'GBP'
    Voucher:
      type: object
