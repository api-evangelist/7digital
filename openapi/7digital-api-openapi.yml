components:
  parameters:
    Country:
      name: country
      in: query
      description: ISO 3166-1 alpha-2 country code for the sales territory.
      schema:
        type: string
        minLength: 2
        maxLength: 2
      example: 'GB'
    Page:
      name: page
      in: query
      description: 1-based page number for paged endpoints.
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1
    PageSize:
      name: pageSize
      in: query
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    Period:
      name: period
      in: query
      description: Chart period — typically `day`, `week`, `month`, `year`.
      schema:
        type: string
        enum: [day, week, month, year]
      example: 'week'
    Query:
      name: q
      in: query
      required: true
      description: Free-text search query.
      schema:
        type: string
      example: 'beatles'
    Tags:
      name: tags
      in: query
      required: true
      description: One or more tag identifiers, comma-separated.
      schema:
        type: string
      example: 'rock,indie'
    ReleaseId:
      name: releaseId
      in: query
      required: true
      description: 7digital release id.
      schema:
        type: string
      example: '11700062'
    ArtistId:
      name: artistId
      in: query
      required: true
      description: 7digital artist id.
      schema:
        type: string
      example: '12345'
    TrackId:
      name: trackId
      in: query
      required: true
      description: 7digital track id.
      schema:
        type: string
      example: '123456'
    BasketId:
      name: basketId
      in: query
      required: true
      description: 7digital basket id.
      schema:
        type: string
        format: uuid
      example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
    ReleaseType:
      name: type
      in: query
      description: Release type filter.
      schema:
        type: string
        enum: [album, single, ep, compilation]
      example: 'album'
  securitySchemes:
    oauth1:
      type: apiKey
      in: query
      name: oauth_consumer_key
      description: >-
        7digital uses OAuth 1.0 signing. Every request MUST include
        `oauth_consumer_key` as either a query parameter or in the Authorization
        header. Sensitive operations require a 2-legged or 3-legged signature
        with a user access token.
    oauth1_two_legged:
      type: apiKey
      in: query
      name: oauth_consumer_key
      description: 2-legged OAuth 1.0 (partner-scoped — consumer key + secret only).
    oauth1_three_legged:
      type: apiKey
      in: query
      name: oauth_consumer_key
      description: 3-legged OAuth 1.0 (consumer key + secret plus a user access token + secret).
  responses:
    AuthError:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      description: Standard 7digital error envelope.
      properties:
        status:
          type: string
          description: Always `error` on a failure.
          example: 'error'
        error:
          type: object
          properties:
            code:
              type: integer
              description: 7digital error code (1xxx input, 2xxx resource, 3xxx user, 7xxx app, 9xxx server).
              example: 2001
            message:
              type: string
              description: Human-readable error message.
              example: 'Resource not found'
            errors:
              type: array
              description: Per-item errors for batch requests (code 1008).
              items:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  index:
                    type: integer
    Artist:
      type: object
      description: A 7digital artist.
      properties:
        id:
          type: string
          description: 7digital artist id.
          example: '12345'
        name:
          type: string
          description: Artist name.
          example: 'The Beatles'
        url:
          type: string
          format: uri
          description: Artist page URL on 7digital.
          example: 'https://uk.7digital.com/artist/the-beatles'
        image:
          type: string
          format: uri
          description: Artist image URL.
          example: 'https://artwork-cdn.7static.com/static/img/artistimages/00/000/012/0000001234_350.jpg'
        sortName:
          type: string
          description: Sort form of the artist name.
          example: 'Beatles, The'
        appearsAs:
          type: string
          description: Alternative spellings under which the artist appears.
          example: 'Beatles, The'
    ArtistDetailsResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        artist:
          $ref: '#/components/schemas/Artist'
    ArtistListResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 42
        artists:
          type: array
          items:
            $ref: '#/components/schemas/Artist'
    Release:
      type: object
      description: A 7digital release (album, single, EP, compilation).
      properties:
        id:
          type: string
          description: 7digital release id.
          example: '11700062'
        title:
          type: string
          description: Release title.
          example: 'Abbey Road'
        version:
          type: string
          description: Release version (e.g. `Remastered`).
          example: 'Remastered'
        type:
          type: string
          enum: [album, single, ep, compilation]
          example: 'album'
        artist:
          $ref: '#/components/schemas/Artist'
        url:
          type: string
          format: uri
          example: 'https://uk.7digital.com/artist/the-beatles/release/abbey-road-11700062'
        image:
          type: string
          format: uri
          example: 'https://artwork-cdn.7static.com/static/img/sleeveart/00/117/000/0011700062_350.jpg'
        releaseDate:
          type: string
          format: date
          example: '1969-09-26'
        label:
          type: string
          example: 'Apple Records'
        explicit:
          type: boolean
          example: false
        upc:
          type: string
          description: Universal Product Code (UPC/EAN).
          example: '00602445912025'
        price:
          $ref: '#/components/schemas/Price'
    ReleaseDetailsResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        release:
          $ref: '#/components/schemas/Release'
    ReleaseListResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 42
        releases:
          type: array
          items:
            $ref: '#/components/schemas/Release'
    Track:
      type: object
      description: A 7digital track.
      properties:
        id:
          type: string
          description: 7digital track id.
          example: '123456'
        title:
          type: string
          description: Track title.
          example: 'Come Together'
        version:
          type: string
          description: Track version (e.g. `Remastered 2019`).
          example: 'Remastered 2019'
        artist:
          $ref: '#/components/schemas/Artist'
        release:
          $ref: '#/components/schemas/Release'
        trackNumber:
          type: integer
          description: Track number on the release.
          example: 1
        duration:
          type: integer
          description: Duration in seconds.
          example: 259
        explicit:
          type: boolean
          example: false
        isrc:
          type: string
          description: International Standard Recording Code.
          example: 'GBAYE6900477'
        previewUrl:
          type: string
          format: uri
          description: URL for the 30-second preview clip.
          example: 'https://previews.7digital.com/clip/123456'
        price:
          $ref: '#/components/schemas/Price'
    TrackDetailsResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        track:
          $ref: '#/components/schemas/Track'
    TrackListResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 13
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/Track'
    Tag:
      type: object
      description: A genre/tag label.
      properties:
        id:
          type: string
          example: 'rock'
        name:
          type: string
          example: 'Rock'
        parentId:
          type: string
          nullable: true
          example: null
    TagListResponse:
      type: object
      properties:
        status:
          type: string
          example: 'ok'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
    Price:
      type: object
      description: A price quoted in the requested territory's currency.
      properties:
        formattedPrice:
          type: string
          example: '£9.99'
        amount:
          type: number
          description: Numeric price value.
          example: 9.99
        currency:
          type: string
          description: ISO 4217 currency code.
          example: 'GBP'
    Basket:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BasketItem'
        total:
          $ref: '#/components/schemas/Price'
        voucherCode:
          type: string
          nullable: true
          example: 'SUMMER25'
    BasketItem:
      type: object
      properties:
        itemId:
          type: string
          example: 'item-789012'
        releaseId:
          type: string
          nullable: true
          example: '11700062'
        trackId:
          type: string
          nullable: true
          example: '123456'
        price:
          $ref: '#/components/schemas/Price'
    Purchase:
      type: object
      properties:
        purchaseId:
          type: string
          example: 'purchase-789012'
        status:
          type: string
          enum: [completed, pending, failed]
          example: 'completed'
        total:
          $ref: '#/components/schemas/Price'
        items:
          type: array
          items:
            $ref: '#/components/schemas/BasketItem'
        receiptUrl:
          type: string
          format: uri
          example: 'https://www.7digital.com/receipts/purchase-789012'
    SubscriptionStatus:
      type: object
      properties:
        userId:
          type: string
          example: '500123'
        status:
          type: string
          enum: [active, cancelled, expired]
          example: 'active'
        startDate:
          type: string
          format: date
          example: '2026-01-01'
        endDate:
          type: string
          format: date
          example: '2026-02-01'
        productId:
          type: string
          example: 'unlimited-streaming'
    Locker:
      type: object
